<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Настройка ассистента</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
.card { width: 480px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 32px; }
.card h1 { font-size: 20px; margin-bottom: 8px; }
.card p { color: #666; font-size: 14px; margin-bottom: 20px; }
.card label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.card input[type="text"] { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 16px; }
.card input[type="text"]:focus { border-color: #2b579a; }
.card button { padding: 12px 24px; background: #2b579a; color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; }
.card button:hover { background: #1e4080; }
.error { color: #d32f2f; font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>Эксперт-консультант по септикам</h1>
  <p>Для работы требуется API-ключ OpenAI. Вставьте его ниже.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/setup">
    <label for="api_key">API-ключ OpenAI (sk-...)</label>
    <input type="text" id="api_key" name="api_key" placeholder="sk-proj-..." autofocus>
    <button type="submit">Сохранить и запустить</button>
  </form>
</div>
</body>
</html>
