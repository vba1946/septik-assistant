<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Эксперт-консультант по септикам</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
.chat-container { width: 700px; height: 90vh; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
.header { background: #2b579a; color: #fff; padding: 18px 24px; display: flex; justify-content: space-between; align-items: flex-start; }
.header-text { flex: 1; }
.header h1 { font-size: 18px; font-weight: 600; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
.header .settings-link { color: #fff; opacity: 0.7; text-decoration: none; font-size: 22px; line-height: 1; padding: 0 4px; }
.header .settings-link:hover { opacity: 1; }
.messages { flex: 1; overflow-y: auto; padding: 20px 24px; }
.msg { margin-bottom: 16px; display: flex; }
.msg.user { justify-content: flex-end; }
.msg .bubble { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
.msg.user .bubble { background: #2b579a; color: #fff; border-bottom-right-radius: 4px; }
.msg.bot .bubble { background: #f0f2f5; color: #1a1a1a; border-bottom-left-radius: 4px; }
.msg.bot .bubble .source { font-size: 11px; color: #888; margin-top: 8px; border-top: 1px solid #ddd; padding-top: 6px; }
.input-area { display: flex; gap: 10px; padding: 16px 24px; border-top: 1px solid #e0e0e0; }
.input-area input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; }
.input-area input:focus { border-color: #2b579a; }
.input-area button { padding: 12px 24px; background: #2b579a; color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
.loading { text-align: center; color: #999; font-size: 13px; padding: 8px; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="header">
    <div class="header-text">
      <h1>Эксперт-консультант по септикам</h1>
      <p>RAG-ассистент на базе 16 документов</p>
    </div>
    <a href="/settings" class="settings-link" title="Настройки">⚙</a>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input type="text" id="input" placeholder="Задайте вопрос..." autofocus>
    <button id="sendBtn" onclick="send()">Отправить</button>
  </div>
</div>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMsg('user', text);
  input.value = '';
  sendBtn.disabled = true;
  const idx = addLoading();

  try {
    const r = await fetch('/ask', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({question: text}) });
    const data = await r.json();
    removeLoading(idx);
    let answer = data.answer;
    if (data.tokens) answer += `\n\n[токены: in=${data.tokens.in} out=${data.tokens.out}]`;
    addMsg('bot', answer);
  } catch {
    removeLoading(idx);
    addMsg('bot', 'Ошибка соединения.');
  }
  sendBtn.disabled = false;
  input.focus();
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="bubble"><div class="loading">...</div></div>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return messages.children.length - 1;
}

function removeLoading(idx) {
  const children = messages.children;
  if (idx < children.length) children[idx].remove();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
