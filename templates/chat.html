<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Система с AI-консультантом</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
.chat-container { width: 700px; height: 90vh; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
.header { background: #2b579a; color: #fff; padding: 18px 24px; display: flex; justify-content: space-between; align-items: flex-start; }
.header-text { flex: 1; }
.header h1 { font-size: 18px; font-weight: 600; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
.header .links { display: flex; gap: 8px; align-items: center; }
.header .links a { color: #fff; opacity: 0.7; text-decoration: none; font-size: 13px; padding: 2px 8px; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; }
.header .links a:hover { opacity: 1; }
.messages { flex: 1; overflow-y: auto; padding: 20px 24px; }
.msg { margin-bottom: 16px; display: flex; }
.msg.user { justify-content: flex-end; }
.msg .bubble { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
.msg.user .bubble { background: #2b579a; color: #fff; border-bottom-right-radius: 4px; }
.msg.bot .bubble { background: #f0f2f5; color: #1a1a1a; border-bottom-left-radius: 4px; }
.input-area { display: flex; gap: 10px; padding: 12px 24px 16px; border-top: 1px solid #e0e0e0; align-items: center; flex-wrap: wrap; }
.input-area .input-wrap { flex: 1; position: relative; min-width: 0; }
.input-area input { width: 100%; padding: 12px 50px 12px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; box-sizing: border-box; }
.input-area input:focus { border-color: #2b579a; }
.input-area input:disabled { background: #f5f5f5; }
.input-area .char-counter { position: absolute; right: 10px; bottom: 8px; font-size: 11px; color: #999; pointer-events: none; }
.input-area .char-counter.over { color: #d32f2f; font-weight: 600; }
.input-area .multi-warn { display: none; font-size: 11px; color: #d32f2f; width: 100%; text-align: center; margin-top: 2px; }
.input-area button { padding: 12px 20px; background: #2b579a; color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; white-space: nowrap; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
.loading { text-align: center; color: #999; font-size: 13px; padding: 8px; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="header">
    <div class="header-text">
      <h1>Система с AI-консультантом</h1>
      <p>{{ mode }} · до {{ tier.maxq }} вопросов</p>
    </div>
    <div class="links">
      <a href="/settings">⚙</a>
      <a href="/admin">admin</a>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="msg bot"><div class="bubble" id="welcomeMsg"></div></div>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="input" placeholder="Задайте вопрос..." autofocus oninput="updateCounter()">
      <span class="char-counter" id="charCounter">0/80</span>
    </div>
    <button id="sendBtn" onclick="send()">Отправить</button>
    <div class="multi-warn" id="multiWarn">Один вопрос за раз. Разделите на отдельные сообщения.</div>
  </div>
</div>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
let exhausted = false;
const urlToken = new URLSearchParams(window.location.search).get('token') || '';
const welcomeEl = document.getElementById('welcomeMsg');

const categories = {{ categories | tojson }};
const welcomeText = 'Здравствуйте, я AI-консультант, меня зовут Владимир. Тариф {{ mode }}: до {{ tier.maxq }} вопросов.' + ('{{ tier.label }}' === 'Simple' ? ' 1 категория из 6: ' + categories[0] : '') + '\nДлина каждого вопроса должна быть до 80 символов с пробелами, но только на 1 тему (категорию) автономной канализации.\nНачинаем.';

welcomeEl.textContent = welcomeText;

// Load history
fetch('/history').then(r => r.json()).then(history => {
  if (history.length > 0) {
    // Hide welcome, show history
    welcomeEl.parentElement.style.display = 'none';
    for (const msg of history) {
      addMsg(msg.role, msg.content);
    }
  }
  messages.scrollTop = messages.scrollHeight;
});

const charCounter = document.getElementById('charCounter');
const multiWarn = document.getElementById('multiWarn');
const MAX_LEN = 80;

function detectMultiQuestion(text) {
  return (text.match(/\?/g) || []).length > 1;
}

function updateCounter() {
  const text = input.value;
  const len = text.length;
  const overLen = len > MAX_LEN;
  const multiQ = detectMultiQuestion(text);
  charCounter.textContent = len + '/' + MAX_LEN;
  charCounter.classList.toggle('over', overLen || multiQ);
  multiWarn.style.display = multiQ ? 'block' : 'none';
  sendBtn.disabled = overLen || len === 0 || multiQ;
}

input.addEventListener('keydown', e => { if (e.key === 'Enter' && !sendBtn.disabled) send(); });

async function send() {
  if (exhausted) return;
  const text = input.value.trim();
  if (!text || detectMultiQuestion(text)) return;

  addMsg('user', text);
  input.value = '';
  sendBtn.disabled = true;
  const idx = addLoading();

  try {
    const r = await fetch('/ask', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({question: text, token: urlToken}) });
    const data = await r.json();
    removeLoading(idx);
    if (data.questions_left !== undefined && data.questions_left <= 0) {
      input.disabled = true;
      sendBtn.disabled = true;
    }
    addMsg('bot', data.answer);
    if (data.exhausted) {
      exhausted = true;
      addContactForm();
    }
  } catch {
    removeLoading(idx);
    addMsg('bot', 'Ошибка соединения.');
  }
  sendBtn.disabled = false;
  input.focus();
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="bubble"><div class="loading">...</div></div>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return messages.children.length - 1;
}

function removeLoading(idx) {
  const children = messages.children;
  if (idx < children.length) children[idx].remove();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addContactForm() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="bubble contact-form"><p style="margin:0 0 8px;font-size:13px;color:#333;">Оставьте контакты, менеджер свяжется:</p><input type="text" id="contactName" placeholder="Имя" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:6px;box-sizing:border-box;"><input type="tel" id="contactPhone" placeholder="Телефон" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:6px;box-sizing:border-box;"><button onclick="submitContact(this)" style="width:100%;padding:8px;background:#2b579a;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;">Отправить</button><span id="contactStatus" style="display:block;margin-top:6px;font-size:12px;color:#666;"></span></div>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function submitContact(btn) {
  const name = document.getElementById('contactName').value.trim();
  const phone = document.getElementById('contactPhone').value.trim();
  const status = document.getElementById('contactStatus');
  if (!name || !phone) { status.textContent = 'Заполните имя и телефон.'; return; }
  status.textContent = 'Отправка...';
  try {
    const r = await fetch('/contact', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name: name, phone: phone, token: urlToken}) });
    const data = await r.json();
    status.textContent = data.message;
    if (data.ok) {
      document.getElementById('contactName').disabled = true;
      document.getElementById('contactPhone').disabled = true;
      document.querySelector('.contact-form button').disabled = true;
    }
  } catch {
    status.textContent = 'Ошибка отправки.';
  }
}
</script>
</body>
</html>
