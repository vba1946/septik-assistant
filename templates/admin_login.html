<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Админка — вход</title>
<style>
body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
.card { background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 320px; }
h1 { font-size: 18px; margin-bottom: 16px; color: #1a3a6b; }
input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; }
button { width: 100%; padding: 10px; background: #1a3a6b; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
.error { color: #d32f2f; font-size: 13px; margin-bottom: 12px; }
</style></head>
<body>
<div class="card">
<h1>Вход в админ-панель</h1>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post">
<input type="password" name="password" placeholder="Пароль" autofocus>
<button type="submit">Войти</button>
</form>
</div>
</body></html>
